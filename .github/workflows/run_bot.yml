name: Instagram News Bot

on:
  schedule:
    - cron: '0 4 * * *'    # 9:30 AM IST
    - cron: '0 7 * * *'    # 12:30 PM IST
    - cron: '0 10 * * *'   # 3:30 PM IST
    - cron: '0 13 * * *'   # 6:30 PM IST
    - cron: '0 16 * * *'   # 9:30 PM IST
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pillow PyNaCl

      - name: Refresh FB token and save to secrets
        env:
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          FB_APP_ID:       ${{ secrets.FB_APP_ID }}
          FB_APP_SECRET:   ${{ secrets.FB_APP_SECRET }}
          FB_PAGE_ID:      ${{ secrets.FB_PAGE_ID }}
          GH_TOKEN:        ${{ secrets.PAT_TOKEN }}
          GH_REPO:         ${{ github.repository }}
        run: python3 refresh_token.py

      - name: Run bot
        env:
          GNEWS_API_KEY:       ${{ secrets.GNEWS_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2:    ${{ secrets.GEMINI_API_KEY_2 }}
          FB_PAGE_ID:          ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN:     ${{ secrets.FB_ACCESS_TOKEN }}
          IG_ACCOUNT_ID:       ${{ secrets.IG_ACCOUNT_ID }}
          PEXELS_API_KEY:      ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY:     ${{ secrets.PIXABAY_API_KEY }}
          FB_APP_ID:           ${{ secrets.FB_APP_ID }}
          FB_APP_SECRET:       ${{ secrets.FB_APP_SECRET }}
        run: python3 bot.py
